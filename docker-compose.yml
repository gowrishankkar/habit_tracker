services:
  # ── API ─────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    restart: unless-stopped
    ports:
      - "4000:4000"
    environment:
      NODE_ENV: production
      API_PORT: 4000
      MONGO_URI: mongodb+srv://shankargkvsulur_db_user:LcjCfWpDifRAE1fd@cluster0.f4aczpq.mongodb.net/habit_tracker?retryWrites=true&w=majority
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production-use-a-real-secret}
      JWT_ACCESS_EXPIRES_IN: 15m
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-change-me-refresh-secret-also-real}
      JWT_REFRESH_EXPIRES_IN: 7d
      CORS_ORIGIN: http://localhost

  # ── Web ─────────────────────────────────────────────
  web:
    build:

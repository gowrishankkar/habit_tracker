services:
  # ── MongoDB ─────────────────────────────────────────
  mongo:
    image: mongo:7
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── API ─────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    restart: unless-stopped
    ports:
      - "4000:4000"
    depends_on:
      mongo:
        condition: service_healthy
    environment:
      NODE_ENV: production
      API_PORT: 4000
      MONGO_URI: mongodb://mongo:27017/habit_tracker
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production-use-a-real-secret}
      JWT_ACCESS_EXPIRES_IN: 15m
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-change-me-refresh-secret-also-real}
      JWT_REFRESH_EXPIRES_IN: 7d
      CORS_ORIGIN: http://localhost

  # ── Web ─────────────────────────────────────────────
  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        VITE_API_URL: /api
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - api

volumes:
  mongo-data:

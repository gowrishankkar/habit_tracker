[build]
  command = "npm ci --workspace=@habit-tracker/web --workspace=@habit-tracker/shared --include-workspace-root && npm run build --workspace=@habit-tracker/web"
  publish = "apps/web/dist"

[build.environment]
  NODE_VERSION = "20"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
